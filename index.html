<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alight Motion Premium Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-5 text-center">
        <h1 class="mb-4">🚀 Alight Motion Premium Generator</h1>
        <p class="lead">Generate akun premium 1 tahun via email disposable</p>
        <button id="generateBtn" class="btn btn-success btn-lg">⚡ Generate Akun Premium</button>
        <div id="result" class="mt-4"></div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ Memproses...';
            try {
                const response = await fetch('/api/generate', { method: 'POST' });
                const data = await response.json();
                if (data.error) {
                    resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${data.error}</div>`;
                } else {
                    resultDiv.innerHTML = `
                        <div class="alert alert-success">
                            ✅ Email: <strong>${data.email}</strong><br>
                            🔑 Password: <strong>${data.password}</strong><br>
                            📅 Premium until: <strong>${data.expiry}</strong><br>
                            <a href="${data.downloadLink}" target="_blank" class="btn btn-primary mt-2">📥 Download Mod APK</a>
                        </div>
                    `;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ Error: ${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
